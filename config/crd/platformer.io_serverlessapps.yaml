---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: serverlessapps.platformer.io
spec:
  group: platformer.io
  names:
    kind: ServerlessApp
    listKind: ServerlessAppList
    plural: serverlessapps
    shortNames:
    - sapp
    singular: serverlessapp
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.apiEndpoint
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          ServerlessApp is the top-level CRD. Developers declare one of these and
          PlatFormer provisions all required cloud infrastructure automatically.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ServerlessAppSpec defines the desired state of a ServerlessApp.
            properties:
              api:
                description: API configures the HTTP API Gateway endpoint.
                properties:
                  enabled:
                    default: true
                    description: Enabled controls whether an API Gateway endpoint
                      is provisioned.
                    type: boolean
                  stage:
                    default: prod
                    description: Stage is the API Gateway deployment stage name.
                    type: string
                type: object
              code:
                description: Code points to the deployment artifact in S3.
                properties:
                  s3Bucket:
                    description: S3Bucket is the bucket containing the deployment
                      zip/image.
                    type: string
                  s3Key:
                    description: S3Key is the object key of the deployment artifact.
                    type: string
                required:
                - s3Bucket
                - s3Key
                type: object
              database:
                description: Database configures optional DynamoDB tables for this
                  app.
                properties:
                  tables:
                    description: Tables is the list of DynamoDB tables to provision.
                    items:
                      description: TableSpec defines a single DynamoDB table.
                      properties:
                        name:
                          description: Name is the DynamoDB table name.
                          type: string
                      required:
                      - name
                      type: object
                    minItems: 1
                    type: array
                required:
                - tables
                type: object
              environment:
                additionalProperties:
                  type: string
                description: Environment variables injected into the Lambda function.
                type: object
              memoryMB:
                default: 512
                description: MemoryMB is the Lambda memory allocation in megabytes
                  (128–10240).
                format: int32
                maximum: 10240
                minimum: 128
                type: integer
              runtime:
                description: Runtime is the Lambda execution runtime. MVP supports
                  "nodejs20.x" only.
                enum:
                - nodejs20.x
                type: string
              timeoutSecs:
                default: 30
                description: TimeoutSecs is the maximum Lambda execution duration
                  in seconds (1–900).
                format: int32
                maximum: 900
                minimum: 1
                type: integer
            required:
            - code
            - runtime
            type: object
          status:
            description: ServerlessAppStatus defines the observed state written back
              by the controller.
            properties:
              apiEndpoint:
                description: APIEndpoint is the public HTTPS URL of the API Gateway
                  endpoint.
                type: string
              apiID:
                description: APIID is the API Gateway API ID.
                type: string
              conditions:
                description: Conditions holds standard Kubernetes condition objects.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              executionRoleARN:
                description: ExecutionRoleARN is the ARN of the IAM execution role.
                type: string
              functionARN:
                description: FunctionARN is the ARN of the provisioned Lambda function.
                type: string
              functionVersion:
                description: FunctionVersion is the published Lambda version.
                type: string
              logGroupName:
                description: LogGroupName is the CloudWatch log group for this function.
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation the controller
                  last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the high-level lifecycle state of the app.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deleting
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
